replicaCount: 1

image:
  repository: grafana/mimir
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 10001

securityContext: {}
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 10001

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9095
  memberlistPort: 7946

storage:
  size: 10Gi
  # -- Storage class for the persistent volume. Set to "-" for default class.
  storageClassName: ""

resources: {}
  # requests:
  #   cpu: 500m
  #   memory: 1Gi
  # limits:
  #   cpu: "2"
  #   memory: 4Gi

livenessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 45
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

# -- S3 storage backend configuration
s3:
  endpoint: s3.amazonaws.com
  bucketName: mimir-blocks
  region: us-east-1
  # -- Use HTTP instead of HTTPS (for local/homelab S3 backends like MinIO or TrueNAS)
  insecure: false
  accessKeyId: ""
  secretAccessKey: ""
  # -- Use an existing secret instead of inline credentials.
  existingSecret: ""
  # -- Env var and secret key mappings for S3 credentials.
  # envVar: the environment variable name set on the container
  # secretKey: the key inside the Kubernetes Secret
  credentials:
    accessKeyId:
      envVar: AWS_ACCESS_KEY_ID
      secretKey: AWS_ACCESS_KEY_ID
    secretAccessKey:
      envVar: AWS_SECRET_ACCESS_KEY
      secretKey: AWS_SECRET_ACCESS_KEY

# -- Gateway API HTTPRoute configuration
httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
    # - name: my-gateway
    #   namespace: gateway-system
  hostnames: []
    # - mimir.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

# -- Full Mimir configuration rendered into a ConfigMap.
# This is processed as a Go template, so Helm expressions are supported.
mimir:
  config: |
    multitenancy_enabled: false

    server:
      http_listen_port: 8080
      grpc_listen_port: 9095
      log_level: info

    common:
      storage:
        backend: s3
        s3:
          endpoint: {{ .Values.s3.endpoint }}
          bucket_name: {{ .Values.s3.bucketName }}
          region: {{ .Values.s3.region }}
          insecure: {{ .Values.s3.insecure }}
          access_key_id: ${{ printf "{%s}" .Values.s3.credentials.accessKeyId.envVar }}
          secret_access_key: ${{ printf "{%s}" .Values.s3.credentials.secretAccessKey.envVar }}

    blocks_storage:
      storage_prefix: blocks
      bucket_store:
        sync_dir: /data/tsdb-sync
      tsdb:
        dir: /data/tsdb

    compactor:
      data_dir: /data/compactor
      sharding_ring:
        kvstore:
          store: inmemory

    distributor:
      ring:
        kvstore:
          store: inmemory

    ingester:
      ring:
        kvstore:
          store: inmemory
        replication_factor: 1

    store_gateway:
      sharding_ring:
        replication_factor: 1
        kvstore:
          store: inmemory

    ruler_storage:
      backend: s3
      s3:
        endpoint: {{ .Values.s3.endpoint }}
        bucket_name: {{ .Values.s3.bucketName }}
        region: {{ .Values.s3.region }}
        insecure: {{ .Values.s3.insecure }}
        access_key_id: ${{ printf "{%s}" .Values.s3.credentials.accessKeyId.envVar }}
        secret_access_key: ${{ printf "{%s}" .Values.s3.credentials.secretAccessKey.envVar }}

    limits:
      compactor_blocks_retention_period: 60d

    activity_tracker:
      filepath: /data/activity.log
